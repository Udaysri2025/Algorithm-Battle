<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Algorithm Battle · Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="premium-app">
        <!-- TOP BAR: Title + Array Controls -->
        <header class="top-bar">
            <div class="logo-area">
                <i class="fas fa-flag-checkered"></i>
                <h1>Algorithm Battle</h1>
                <span class="badge">Premium</span>
            </div>
            <div class="array-controls">
                <div class="control-item">
                    <label><i class="fas fa-cubes"></i> Size</label>
                    <input type="range" id="array-size" min="10" max="100" value="50">
                    <span id="size-value">50</span>
                </div>
                <div class="control-item">
                    <label><i class="fas fa-dice"></i> Preset</label>
                    <select id="array-preset">
                        <option value="random">Random</option>
                        <option value="nearly_sorted">Nearly Sorted</option>
                        <option value="reversed">Reversed</option>
                        <option value="few_unique">Few Unique</option>
                    </select>
                </div>
                <button class="btn btn-outline" onclick="generateNewArray()">
                    <i class="fas fa-arrows-rotate"></i> Generate
                </button>
            </div>
        </header>

        <!-- ALGORITHM SELECTORS + STATS HEADERS -->
        <div class="algo-selectors">
            <div class="algo-card" id="algo-a-card">
                <select id="algo-a" class="algo-select">
                    <option value="bubble">Bubble Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="quick" selected>Quick Sort</option>
                    <option value="merge">Merge Sort</option>
                </select>
                <div class="algo-stats" id="stats-a">
                    <span><i class="fas fa-balance-scale"></i> <span id="comp-a">0</span></span>
                    <span><i class="fas fa-arrow-right-arrow-left"></i> <span id="swap-a">0</span></span>
                    <span><i class="fas fa-microchip"></i> <span id="access-a">0</span></span>
                </div>
            </div>
            <div class="vs-divider">
                <span>VS</span>
            </div>
            <div class="algo-card" id="algo-b-card">
                <select id="algo-b" class="algo-select">
                    <option value="bubble" selected>Bubble Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="quick">Quick Sort</option>
                    <option value="merge">Merge Sort</option>
                </select>
                <div class="algo-stats" id="stats-b">
                    <span><i class="fas fa-balance-scale"></i> <span id="comp-b">0</span></span>
                    <span><i class="fas fa-arrow-right-arrow-left"></i> <span id="swap-b">0</span></span>
                    <span><i class="fas fa-microchip"></i> <span id="access-b">0</span></span>
                </div>
            </div>
        </div>

        <!-- VISUALIZATION AREA (Two Columns) -->
        <div class="viz-area">
            <div class="viz-panel" id="panel-a">
                <div class="viz-header" id="header-a">
                    <span class="algo-name" id="algo-a-name">Quick Sort</span>
                </div>
                <div class="viz-container" id="viz-a"></div>
            </div>
            <div class="viz-panel" id="panel-b">
                <div class="viz-header" id="header-b">
                    <span class="algo-name" id="algo-b-name">Bubble Sort</span>
                </div>
                <div class="viz-container" id="viz-b"></div>
            </div>
        </div>

        <!-- BOTTOM CONTROL BAR -->
        <footer class="control-bar">
            <div class="execution-group">
                <button class="btn btn-success" id="play-btn" onclick="startBattle()">
                    <i class="fas fa-play"></i> Start Battle
                </button>
                <button class="btn btn-warning" id="pause-btn" onclick="pauseBattle()" disabled>
                    <i class="fas fa-pause"></i> Pause
                </button>
                <button class="btn btn-secondary" id="step-btn" onclick="stepBattle()" disabled>
                    <i class="fas fa-step-forward"></i> Step
                </button>
                <button class="btn btn-danger" onclick="resetBattle()">
                    <i class="fas fa-undo-alt"></i> Reset
                </button>
            </div>
            <div class="speed-group">
                <i class="fas fa-tachometer-alt"></i>
                <input type="range" id="speed-slider" min="1" max="100" value="50">
            </div>
            <div class="winner-group" id="winner-panel">
                <i class="fas fa-trophy"></i>
                <span id="winner-display">—</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
